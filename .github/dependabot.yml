###############################################################################
# Dependabot — keep CI deps + actions current; weekday-only PRs to avoid
# weekend noise. Security updates run daily.
###############################################################################

version: 2
updates:

  # GitHub Actions — pin to versions Dependabot can manage; PRs auto-bump.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    reviewers:
      - data-platform-team/devops-team
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
      include: scope

  # Python deps used by tests + DAB.
  - package-ecosystem: pip
    directory: /poc
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    reviewers:
      - data-platform-team
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "deps"
      include: scope

  # Terraform providers.
  - package-ecosystem: terraform
    directory: /poc/infrastructure/terraform
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    reviewers:
      - cloud-platform-team
    labels:
      - dependencies
      - terraform
    commit-message:
      prefix: "infra"
