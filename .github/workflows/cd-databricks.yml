###############################################################################
# CD · Databricks (Asset Bundles)
#
# Validates and deploys the bundle to the resolved environment, then runs a
# smoke job. The smoke job re-runs `02_scd2_dim_material` against a tiny
# fixture dataset so we know the workspace + UC + cluster are wired correctly.
###############################################################################

name: CD · Databricks

on:
  push:
    branches: [dev, test]
    paths:
      - 'poc/databricks/**'
      - 'databricks.yml'
      - '.github/workflows/cd-databricks.yml'
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [dev, test, prod]
        default: dev

concurrency:
  group: cd-databricks-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  resolve-env:
    name: Resolve target environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.pick.outputs.env }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/prod" ]; then
            echo "env=prod" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/test" ]; then
            echo "env=test" >> "$GITHUB_OUTPUT"
          else
            echo "env=dev" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy bundle (${{ needs.resolve-env.outputs.environment }})
    needs: resolve-env
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.232.1

      - name: Configure Databricks workspace (Azure AD token from OIDC)
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
        run: |
          # CLI reads DATABRICKS_HOST + AAD token from `az`
          databricks auth login --host "$DATABRICKS_HOST"
          databricks current-user me

      - name: Validate bundle
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
        run: databricks bundle validate --target ${{ needs.resolve-env.outputs.environment }}

      - name: Deploy bundle
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
        run: |
          databricks bundle deploy \
            --target ${{ needs.resolve-env.outputs.environment }} \
            --auto-approve

      - name: Smoke run (scd2 dim_material against fixture)
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
        run: |
          databricks bundle run scd2_dim_material_smoke \
            --target ${{ needs.resolve-env.outputs.environment }}

      - name: Summary
        if: always()
        run: |
          {
            echo "## Databricks deploy — ${{ needs.resolve-env.outputs.environment }}"
            echo "Bundle target: ${{ needs.resolve-env.outputs.environment }}"
            echo "Smoke job: scd2_dim_material_smoke"
          } >> "$GITHUB_STEP_SUMMARY"
