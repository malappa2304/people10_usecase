###############################################################################
# Release — tag-driven prod deploy.
#
# Tags MUST be cut on the `prod` branch only (after the test → prod MR has merged).
#
#   git checkout prod && git pull --ff-only
#   git tag -s v1.4.0 -m 'Wave 3 supply chain'
#   git push origin v1.4.0
#
# A guard step below verifies the tag is reachable from `prod`; tagging from any
# other branch fails the workflow.
###############################################################################

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  guard-tag-on-prod:
    name: Verify tag is reachable from prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fail if tag not on prod
        run: |
          set -euo pipefail
          git fetch origin prod --quiet
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/prod; then
            echo "::error::Tag ${GITHUB_REF_NAME} is not reachable from origin/prod."
            echo "Tags must be cut on prod only — see docs/05_promotion_runbook.md §3."
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} confirmed on prod (sha=${GITHUB_SHA})"

  release:
    needs: guard-tag-on-prod
    runs-on: ubuntu-latest
    environment: prod    # 2 reviewers per env protection
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-file: false
          skip-version-file: true
          skip-commit: true
          skip-tag: true

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.clean_changelog }}
          files: |
            sbom.cdx.json

  # Trigger prod CD workflows after the release is cut.
  trigger-prod-cd:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const flows = ['cd-infra.yml', 'cd-databricks.yml', 'cd-adf.yml', 'cd-synapse.yml'];
            for (const wf of flows) {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                workflow_id: wf,
                ref: context.ref,
                inputs: { environment: 'prod' }
              });
            }
