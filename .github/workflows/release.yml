###############################################################################
# Release — tag-driven prod deploy.
#
#   git tag -s v1.4.0 -m 'Wave 3 supply chain'
#   git push origin v1.4.0
#
# This workflow generates the GitHub Release with auto-changelog + SBOM, then
# orchestrates the prod CD workflows.
###############################################################################

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: prod    # 2 reviewers per env protection
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-file: false
          skip-version-file: true
          skip-commit: true
          skip-tag: true

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.clean_changelog }}
          files: |
            sbom.cdx.json

  # Trigger prod CD workflows after the release is cut.
  trigger-prod-cd:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const flows = ['cd-infra.yml', 'cd-databricks.yml', 'cd-adf.yml', 'cd-synapse.yml'];
            for (const wf of flows) {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                workflow_id: wf,
                ref: context.ref,
                inputs: { environment: 'prod' }
              });
            }
