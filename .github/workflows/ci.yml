###############################################################################
# CI — runs on every PR and push to dev.
#
# Required checks: lint-python, python-tests (coverage gate >= 80%),
# terraform-validate, security-scan. Kept deliberately lean for a 3-day PoC;
# production CI/CD would also include CD workflows, OIDC federation, and
# environment promotion. The shape is described in docs/02_design_document.md.
###############################################################################

name: CI

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:

  lint-python:
    name: Lint · Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install linters
        run: pip install ruff==0.4.* mypy==1.10.*
      - name: ruff check
        run: ruff check poc/
      - name: ruff format check
        run: ruff format --check poc/
      - name: mypy --strict (production lib only)
        run: mypy --strict --ignore-missing-imports poc/databricks/lib/

  python-tests:
    name: Tests · pytest + chispa (coverage ≥ 80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install test deps
        run: |
          pip install \
            "pyspark==3.5.*" "delta-spark==3.2.*" \
            "pytest==8.*" "pytest-cov==5.*" "chispa==0.10.*"
      - name: Run pytest
        run: |
          PYTHONPATH=poc pytest poc/tests/ -v \
            --cov=poc/databricks/lib \
            --cov-report=xml --cov-report=term \
            --cov-fail-under=80
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  terraform-validate:
    name: IaC · Terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: poc/infrastructure/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
      - name: terraform fmt
        run: terraform fmt -check -recursive
      - name: terraform init (no backend)
        run: terraform init -backend=false
      - name: terraform validate
        run: terraform validate -no-color

  security-scan:
    name: Security · gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
