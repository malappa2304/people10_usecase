###############################################################################
# CI — what runs on every PR.
#
# I wanted production-shape quality gates without bloating this file.
# Each job earns its keep:
#
#   pr-title           Conventional Commits, so the changelog is auto-buildable
#   changes            path filter — doc-only PRs don't pay for terraform jobs
#   lint-python        ruff + mypy --strict on the lib (notebooks are too lenient
#                      for --strict; that's a deliberate scope)
#   python-tests       pytest + chispa, coverage gate on the lib only
#   python-security    pip-audit on the test deps. In production this would
#                      point at requirements.lock or pyproject.toml
#   terraform-validate fmt + validate. tflint / checkov are the next step
#   secret-scan        gitleaks over full history
#   ci-summary         one table to GITHUB_STEP_SUMMARY so the PR view doesn't
#                      need digging through job logs
#
# A few choices I'd defend in a review:
#   - Top-level permissions: contents: read. Jobs widen as they need to.
#   - Concurrency cancels in-progress on PRs, never on dev. Half a CI run
#     on dev wastes more than it saves.
#   - Actions are pinned to major version. SHA pinning is the next supply-
#     chain step (with step-security/harden-runner); Dependabot is wired
#     to drive the bumps. See design doc §8.1.
###############################################################################

name: CI

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]
  workflow_dispatch: {}

# PRs cancel in-progress runs on the same ref; dev-branch CI runs to completion.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Top-level least-privilege. Individual jobs widen as needed.
permissions:
  contents: read

jobs:

  # -- Conventional Commits enforcement on PR titles ---------------------------
  pr-title:
    name: PR title · conventional commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            test
            chore
            ci
            perf
            build
            revert

  # -- Detect what changed so we can skip unrelated jobs -----------------------
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      python:    ${{ steps.filter.outputs.python }}
      terraform: ${{ steps.filter.outputs.terraform }}
      sql:       ${{ steps.filter.outputs.sql }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'poc/databricks/**'
              - 'poc/tests/**'
              - 'Makefile'
              - 'databricks.yml'
            terraform:
              - 'poc/infrastructure/terraform/**'
            sql:
              - 'poc/synapse/**/*.sql'

  # -- Python lint: ruff + mypy ------------------------------------------------
  lint-python:
    name: Lint · Python
    needs: changes
    if: needs.changes.outputs.python == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install linters
        run: pip install --no-cache-dir "ruff==0.6.*" "mypy==1.10.*"
      - name: ruff check
        run: ruff check poc/
      - name: ruff format check
        run: ruff format --check poc/
      - name: mypy --strict (production library only)
        run: mypy --strict --ignore-missing-imports poc/databricks/lib/

  # -- Tests: pytest + chispa with coverage gate -------------------------------
  python-tests:
    name: Tests · pytest + chispa (cov ≥ 80%)
    needs: changes
    if: needs.changes.outputs.python == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install test deps
        run: |
          pip install --no-cache-dir \
            "pyspark==3.5.*" "delta-spark==3.2.*" \
            "pytest==8.*" "pytest-cov==5.*" "chispa==0.10.*"
      - name: Run pytest
        run: |
          PYTHONPATH=poc pytest poc/tests/ -v \
            --cov=poc/databricks/lib \
            --cov-report=xml --cov-report=term \
            --cov-fail-under=80
      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  # -- Python supply-chain audit (CVEs in test deps) ---------------------------
  python-security:
    name: Security · pip-audit (Python deps)
    needs: changes
    if: needs.changes.outputs.python == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: pip install --no-cache-dir "pip-audit==2.7.*"
      - name: Audit the test dep closure
        # Done against the same set of pinned versions the test job installs.
        # In production this would point at requirements.lock or pyproject.toml.
        run: |
          cat <<'EOF' > /tmp/req.txt
          pyspark==3.5.0
          delta-spark==3.2.0
          chispa==0.10.0
          pytest==8.3.3
          EOF
          pip-audit --strict -r /tmp/req.txt

  # -- Terraform: fmt + validate (no apply, no plan against real state) --------
  terraform-validate:
    name: IaC · Terraform validate
    needs: changes
    if: needs.changes.outputs.terraform == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: poc/infrastructure/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: terraform fmt
        run: terraform fmt -check -recursive
      - name: terraform init (no backend)
        run: terraform init -backend=false
      - name: terraform validate
        run: terraform validate -no-color

  # -- Secret-scan the full history --------------------------------------------
  secret-scan:
    name: Security · gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -- Single summary posted to the PR -----------------------------------------
  ci-summary:
    name: CI summary
    if: always()
    needs:
      - pr-title
      - lint-python
      - python-tests
      - python-security
      - terraform-validate
      - secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate
        run: |
          {
            echo "## CI summary"
            echo ""
            echo "| Check | Result |"
            echo "| -- | -- |"
            echo "| PR title (Conventional Commits) | ${{ needs.pr-title.result }} |"
            echo "| Lint Python (ruff + mypy)       | ${{ needs.lint-python.result }} |"
            echo "| pytest + chispa (cov ≥ 80%)     | ${{ needs.python-tests.result }} |"
            echo "| Python security (pip-audit)     | ${{ needs.python-security.result }} |"
            echo "| Terraform validate              | ${{ needs.terraform-validate.result }} |"
            echo "| Secret scan (gitleaks)          | ${{ needs.secret-scan.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"
