###############################################################################
# CD · Azure Data Factory
#
# Two-stage:
#   1. Bicep deploys / updates the ADF resource itself + diagnostic settings.
#   2. `az datafactory` pushes linked services / datasets / pipelines / triggers
#      from the JSON artefacts under poc/adf/.
#
# Triggers are stopped before the JSON push and started after — required by ADF
# to avoid mid-deploy trigger fires.
###############################################################################

name: CD · ADF

on:
  push:
    branches: [develop, uat]
    paths:
      - 'poc/adf/**'
      - 'poc/infrastructure/bicep/adf_pipeline.bicep'
      - '.github/workflows/cd-adf.yml'
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [dev, uat, prod]
        default: dev

concurrency:
  group: cd-adf-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.pick.outputs.env }}
      rg:          rg-chandan-${{ steps.pick.outputs.env }}
      adf:         adf-chandan-${{ steps.pick.outputs.env }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/uat" ]; then
            echo "env=uat" >> "$GITHUB_OUTPUT"
          else
            echo "env=dev" >> "$GITHUB_OUTPUT"
          fi

  bicep-deploy:
    name: Bicep · ADF resource
    needs: resolve-env
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.environment }}
    steps:
      - uses: actions/checkout@v6

      - uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: what-if (PR-style preview)
        run: |
          az deployment group what-if \
            --resource-group ${{ needs.resolve-env.outputs.rg }} \
            --template-file poc/infrastructure/bicep/adf_pipeline.bicep \
            --parameters environment=${{ needs.resolve-env.outputs.environment }} \
                         keyVaultId=${{ vars.KEY_VAULT_ID }} \
                         databricksWorkspaceId=${{ vars.DATABRICKS_WORKSPACE_ID }} \
            --no-pretty-print | tee whatif.json

      - uses: azure/arm-deploy@v2
        with:
          subscriptionId:    ${{ vars.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ needs.resolve-env.outputs.rg }}
          template:          poc/infrastructure/bicep/adf_pipeline.bicep
          parameters: >-
            environment=${{ needs.resolve-env.outputs.environment }}
            keyVaultId=${{ vars.KEY_VAULT_ID }}
            databricksWorkspaceId=${{ vars.DATABRICKS_WORKSPACE_ID }}
          deploymentMode: Incremental

  push-artefacts:
    name: Push linked services + datasets + pipelines + triggers
    needs: [resolve-env, bicep-deploy]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.environment }}
    env:
      RG:  ${{ needs.resolve-env.outputs.rg }}
      ADF: ${{ needs.resolve-env.outputs.adf }}
    steps:
      - uses: actions/checkout@v6

      - uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Stop triggers (avoid mid-deploy fires)
        run: |
          for trg in $(az datafactory trigger list -g $RG --factory-name $ADF --query "[].name" -o tsv); do
            echo "Stopping trigger $trg"
            az datafactory trigger stop -g $RG --factory-name $ADF --name "$trg" || true
          done

      - name: Deploy linked services
        run: |
          for f in poc/adf/linked_services/*.json; do
            name=$(basename "$f" .json)
            echo "::group::Deploy $name"
            az datafactory linked-service create \
              --resource-group $RG --factory-name $ADF \
              --linked-service-name "$name" \
              --properties "@$f"
            echo "::endgroup::"
          done

      - name: Deploy datasets
        run: |
          for f in poc/adf/datasets/*.json; do
            name=$(basename "$f" .json)
            az datafactory dataset create -g $RG --factory-name $ADF --dataset-name "$name" --properties "@$f"
          done

      - name: Deploy pipelines
        run: |
          for f in poc/adf/pipelines/*.json; do
            name=$(basename "$f" .json)
            az datafactory pipeline create -g $RG --factory-name $ADF --name "$name" --pipeline "@$f"
          done

      - name: Deploy triggers
        run: |
          for f in poc/adf/triggers/*.json; do
            name=$(basename "$f" .json)
            az datafactory trigger create -g $RG --factory-name $ADF --name "$name" --properties "@$f"
          done

      - name: Start triggers
        run: |
          for trg in $(az datafactory trigger list -g $RG --factory-name $ADF --query "[].name" -o tsv); do
            echo "Starting trigger $trg"
            az datafactory trigger start -g $RG --factory-name $ADF --name "$trg" || true
          done

      - name: Summary
        if: always()
        run: |
          {
            echo "## ADF deploy — ${{ needs.resolve-env.outputs.environment }}"
            echo "Factory: $ADF"
            az datafactory pipeline list -g $RG --factory-name $ADF --query "[].name" -o tsv \
              | sed 's/^/  - /'
          } >> "$GITHUB_STEP_SUMMARY"
