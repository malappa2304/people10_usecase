###############################################################################
# CD · Terraform infra deploy
#
# Promotion model:
#   develop  → environment: dev   (auto-deploy after CI green)
#   uat      → environment: uat   (1 reviewer)
#   main+tag → environment: prod  (2 reviewers, plus tag-on-main gate)
#
# Plan is always posted to the PR / Step Summary; apply is gated by GitHub
# Environment protection (reviewers configured per env in repo settings).
###############################################################################

name: CD · Infra (Terraform)

on:
  push:
    branches: [develop, uat]
    paths:
      - 'poc/infrastructure/terraform/**'
      - '.github/workflows/cd-infra.yml'
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [dev, uat, prod]
        default: dev

# Once apply starts, do NOT cancel — half-applied infra is worse than queued.
concurrency:
  group: cd-infra-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:

  resolve-env:
    name: Resolve target environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.pick.outputs.env }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/uat" ]; then
            echo "env=uat" >> "$GITHUB_OUTPUT"
          else
            echo "env=dev" >> "$GITHUB_OUTPUT"
          fi

  plan:
    name: terraform plan
    needs: resolve-env
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.environment }}
    defaults:
      run:
        working-directory: poc/infrastructure/terraform
    steps:
      - uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: terraform init (remote backend)
        env:
          ARM_USE_OIDC: "true"
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-tfstate" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=chandan-${{ needs.resolve-env.outputs.environment }}.tfstate"

      - name: terraform plan
        env:
          ARM_USE_OIDC: "true"
        run: |
          terraform plan \
            -var environment=${{ needs.resolve-env.outputs.environment }} \
            -out=tfplan \
            -no-color \
            | tee plan.txt

      - name: Post plan to step summary
        run: |
          {
            echo "## Terraform plan — ${{ needs.resolve-env.outputs.environment }}"
            echo ""
            echo '```'
            tail -c 60000 plan.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artefact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ needs.resolve-env.outputs.environment }}
          path: poc/infrastructure/terraform/tfplan
          retention-days: 14

  apply:
    name: terraform apply
    needs: [resolve-env, plan]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.environment }}    # ← reviewer gate enforced here
    defaults:
      run:
        working-directory: poc/infrastructure/terraform
    steps:
      - uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: terraform init
        env:
          ARM_USE_OIDC: "true"
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-tfstate" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=chandan-${{ needs.resolve-env.outputs.environment }}.tfstate"

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ needs.resolve-env.outputs.environment }}
          path: poc/infrastructure/terraform/

      - name: terraform apply
        env:
          ARM_USE_OIDC: "true"
        run: terraform apply -auto-approve -no-color tfplan
