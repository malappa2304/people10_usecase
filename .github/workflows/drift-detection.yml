###############################################################################
# Drift detection — runs `terraform plan` against prod on a weekday morning.
# If the plan is non-empty (drift), opens an issue tagged `drift` and posts to
# Teams. Catches out-of-band Azure portal changes that bypass IaC.
###############################################################################

name: Drift detection (prod)

on:
  schedule:
    - cron: '30 0 * * 1-5'      # 06:00 IST weekdays
  workflow_dispatch:

concurrency:
  group: drift-detection-prod
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  detect:
    runs-on: ubuntu-latest
    environment: prod-readonly       # separate env with read-only RBAC for drift
    defaults:
      run:
        working-directory: poc/infrastructure/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.8.5

      - name: terraform init
        env:
          ARM_USE_OIDC: "true"
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-tfstate" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=chandan-prod.tfstate"

      - name: terraform plan -detailed-exitcode
        id: plan
        env:
          ARM_USE_OIDC: "true"
        continue-on-error: true
        run: |
          terraform plan -var environment=prod -no-color -detailed-exitcode \
            -out=drift.plan | tee drift.txt
          # exit codes: 0 = no changes, 1 = error, 2 = drift detected
          echo "exit=$?" >> "$GITHUB_OUTPUT"

      - name: Open drift issue if drift detected
        if: steps.plan.outputs.exit == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('poc/infrastructure/terraform/drift.txt', 'utf8').slice(-50000);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `[drift] Prod IaC drift detected — ${new Date().toISOString().slice(0,10)}`,
              labels: ['drift', 'production', 'priority:p3'],
              body:  '## Terraform plan output\n\n```\n' + plan + '\n```'
            });
