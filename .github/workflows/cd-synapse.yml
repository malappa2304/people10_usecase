###############################################################################
# CD · Synapse — apply DDL + curated views, run a smoke query.
#
# DDL idempotency is enforced in the SQL itself (`IF OBJECT_ID('...') IS NULL`
# on tables; `IF OBJECT_ID(..., 'V')` + DROP for views). For schema-breaking
# changes the PR template enforces a paired up + down migration script.
###############################################################################

name: CD · Synapse

on:
  push:
    branches: [dev, test]
    paths:
      - 'poc/synapse/**'
      - '.github/workflows/cd-synapse.yml'
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [dev, test, prod]
        default: dev

concurrency:
  group: cd-synapse-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.pick.outputs.env }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/prod" ]; then
            echo "env=prod" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/test" ]; then
            echo "env=test" >> "$GITHUB_OUTPUT"
          else
            echo "env=dev" >> "$GITHUB_OUTPUT"
          fi

  apply-ddl:
    name: Apply DDL (${{ needs.resolve-env.outputs.environment }})
    needs: resolve-env
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.environment }}
    env:
      SYNAPSE_WORKSPACE: syn-chandan-${{ needs.resolve-env.outputs.environment }}
      DEDICATED_POOL:    dwexec
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install sqlcmd (go)
        run: |
          curl -L https://github.com/microsoft/go-sqlcmd/releases/download/v1.7.0/sqlcmd-linux-amd64.tar.bz2 \
            | tar xj
          sudo mv sqlcmd /usr/local/bin/

      - name: Acquire AAD access token for Synapse
        run: |
          TOKEN=$(az account get-access-token \
            --resource https://sql.azuresynapse.net/ \
            --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "SQLCMDPASSWORD=$TOKEN" >> "$GITHUB_ENV"

      - name: Apply DDL files in order
        run: |
          set -euo pipefail
          for f in \
            poc/synapse/ddl/dim_material.sql \
            poc/synapse/ddl/fact_production_order.sql \
            poc/synapse/ddl/fact_supplier_otd.sql \
            poc/synapse/ddl/views_curated.sql; do
            echo "::group::$f"
            sqlcmd -S "$SYNAPSE_WORKSPACE.sql.azuresynapse.net" \
                   -d "$DEDICATED_POOL" \
                   -G --authentication-method=ActiveDirectoryAccessToken \
                   -i "$f" -b
            echo "::endgroup::"
          done

      - name: Smoke query
        run: |
          sqlcmd -S "$SYNAPSE_WORKSPACE.sql.azuresynapse.net" \
                 -d "$DEDICATED_POOL" \
                 -G --authentication-method=ActiveDirectoryAccessToken \
                 -Q "SELECT name, type_desc FROM sys.objects WHERE schema_id = SCHEMA_ID('dbo') ORDER BY name;"
