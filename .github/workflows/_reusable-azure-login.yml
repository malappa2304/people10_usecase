###############################################################################
# Reusable workflow — federated Azure login via OIDC.
#
# Usage:
#   jobs:
#     deploy:
#       uses: ./.github/workflows/_reusable-azure-login.yml
#       with:
#         environment: dev
#         subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
#       secrets: inherit
#
# Why a reusable workflow and not a composite action: composite actions can't
# request `id-token: write` on their own — only at the job level. A reusable
# workflow brings the right permission scope with it.
###############################################################################

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: GitHub Environment name (dev | test | prod)
      subscription-id:
        required: true
        type: string

permissions:
  id-token: write   # mandatory for OIDC
  contents: read

jobs:
  azure-login:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ inputs.subscription-id }}

      - name: Verify identity and subscription
        run: |
          az account show --query "{subscription:name, tenant:tenantId, id:id}" -o table
          # Fail-closed if we somehow ended up in the wrong subscription.
          CURRENT=$(az account show --query id -o tsv)
          if [ "$CURRENT" != "${{ inputs.subscription-id }}" ]; then
            echo "::error::Active subscription $CURRENT != expected ${{ inputs.subscription-id }}"
            exit 1
          fi
