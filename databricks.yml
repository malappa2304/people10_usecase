# =============================================================================
# Databricks Asset Bundle — declarative deploy of notebooks + DLT pipeline
# across dev / test / prod targets.
# =============================================================================

bundle:
  name: people10-poc

include:
  - poc/databricks/notebooks/*.py

variables:
  catalog:
    description: Unity Catalog name; environment-specific.
  cluster_node_type:
    description: Node type for batch jobs.
    default: Standard_DS4_v2
  eh_bootstrap:
    description: Event Hubs Kafka bootstrap servers (env-specific).
    default: chandan-eventhubs-dev.servicebus.windows.net:9093
  lake_account:
    description: ADLS Gen2 storage account name (env-specific).
    default: chandanlakedev

# -----------------------------------------------------------------------------
# Resources
# -----------------------------------------------------------------------------
resources:
  jobs:

    # Smoke job — re-runs SCD2 dim_material against a fixture dataset
    # as a post-deploy health check.
    scd2_dim_material_smoke:
      name: "[smoke] scd2_dim_material — ${bundle.target}"
      tasks:
        - task_key: scd2_smoke
          notebook_task:
            notebook_path: ./poc/databricks/notebooks/02_scd2_dim_material.py
            base_parameters:
              run_mode: smoke
              fixture_path: /Volumes/${var.catalog}/fixtures/dim_material_smoke
          new_cluster:
            spark_version: 14.3.x-photon-scala2.12
            node_type_id: ${var.cluster_node_type}
            num_workers: 1
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"
              spark.sql.adaptive.enabled: "true"
      timeout_seconds: 1200
      max_concurrent_runs: 1
      email_notifications:
        on_failure:
          - data-oncall@example.com

    # Daily orchestrator job — Bronze→Silver SAP, then SCD2 dim_material.
    daily_orchestrator:
      name: "Daily orchestrator — ${bundle.target}"
      tasks:
        - task_key: bronze_to_silver_po
          notebook_task:
            notebook_path: ./poc/databricks/notebooks/01_bronze_to_silver_production_order.py
        - task_key: scd2_dim_material
          depends_on:
            - task_key: bronze_to_silver_po
          notebook_task:
            notebook_path: ./poc/databricks/notebooks/02_scd2_dim_material.py
      schedule:
        quartz_cron_expression: "0 0 21 ? * MON-FRI"   # 02:00 IST = 21:30 UTC
        timezone_id: UTC
        pause_status: PAUSED

    # Continuous streaming job — CNC telemetry.
    streaming_cnc_telemetry:
      name: "Streaming · CNC telemetry — ${bundle.target}"
      continuous:
        # Paused on dev so the cluster doesn't burn budget during local dev;
        # unpaused on test/prod via the per-target overrides at the bottom.
        pause_status: PAUSED
      tasks:
        - task_key: cnc_stream
          notebook_task:
            notebook_path: ./poc/databricks/notebooks/04_streaming_cnc_telemetry.py
          job_cluster_key: streaming_cluster
      job_clusters:
        - job_cluster_key: streaming_cluster
          new_cluster:
            spark_version: 14.3.x-photon-scala2.12
            node_type_id: Standard_DS5_v2
            num_workers: 4
            spark_conf:
              spark.sql.streaming.stateStore.providerClass: com.databricks.sql.streaming.state.RocksDBStateStoreProvider

  # ---------------------------------------------------------------------------
  # DLT pipelines (Lakeflow Declarative)
  # ---------------------------------------------------------------------------
  pipelines:

    # Unified medallion — streaming CNC telemetry + batch SAP files in ONE pipeline.
    # The canonical Databricks pattern for "unify streaming and batch data".
    unified_medallion:
      name: "Unified Medallion (streaming + batch DLT) — ${bundle.target}"
      catalog: ${var.catalog}
      target: medallion
      libraries:
        - notebook:
            path: ./poc/databricks/pipelines/unified_medallion_dlt.py
      configuration:
        pipelines.useDefaultPublishMode: "true"
        eh_bootstrap:    "${var.eh_bootstrap}"
        eh_topic:        "cnc-telemetry"
        sap_bronze_path: "abfss://bronze@${var.lake_account}.dfs.core.windows.net/sap/production_order/"
        schemas_path:    "abfss://checkpoints@${var.lake_account}.dfs.core.windows.net/dlt/schemas/"
      development: true     # serverless / fast-iterate on dev; overridden per-target below
      photon: true
      channel: PREVIEW

# -----------------------------------------------------------------------------
# Targets
# -----------------------------------------------------------------------------
targets:

  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-dev.azuredatabricks.net
    variables:
      catalog:      people10_dev
      eh_bootstrap: people10-eventhubs-dev.servicebus.windows.net:9093
      lake_account: people10lakedev

  test:
    mode: production
    workspace:
      host: https://adb-test.azuredatabricks.net
      root_path: /Workspace/Shared/.bundle/${bundle.name}/test
    variables:
      catalog:      people10_test
      eh_bootstrap: people10-eventhubs-test.servicebus.windows.net:9093
      lake_account: people10laketest

  prod:
    mode: production
    workspace:
      host: https://adb-prod.azuredatabricks.net
      root_path: /Workspace/Shared/.bundle/${bundle.name}/prod
    variables:
      catalog:           people10_prod
      cluster_node_type: Standard_DS5_v2
      eh_bootstrap:      people10-eventhubs-prod.servicebus.windows.net:9093
      lake_account:      people10lakeprod
